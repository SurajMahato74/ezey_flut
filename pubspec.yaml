name: ezeyway
description: Instant Delivery, Simplified - A Flutter delivery app
version: 1.0.2+3

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  google_fonts: ^6.1.0
  intl: ^0.19.0
  http: ^1.1.0
  shared_preferences: ^2.2.2
  provider: ^6.1.5+1
  image_picker: ^1.0.7
  geolocator: ^11.0.0
  geocoding: ^2.1.1
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  url_launcher: ^6.2.2
  timeago: ^3.6.1
  pdf: ^3.11.3
  printing: ^5.14.2
  cached_network_image: ^3.3.1
  web_socket_channel: ^2.4.0
  agora_rtc_engine: ^6.3.2
  permission_handler: ^11.0.1
  firebase_messaging: ^15.0.0
  firebase_core: ^3.0.0
  flutter_local_notifications: ^17.0.0
  flutter_callkit_incoming: ^2.0.0
  wakelock_plus: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/ezeywaylogo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/ezeywaylogo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
