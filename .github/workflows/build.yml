name: Build App Bundle

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.38.5'
        channel: 'stable'
    
    - name: Get dependencies
      run: flutter pub get
    
    - name: Create keystore
      run: |
        keytool -genkey -v -keystore android/app/upload-keystore.jks -keyalg RSA -keysize 2048 -validity 10000 -alias upload -storepass android123 -keypass android123 -dname "CN=Upload, OU=Android, O=Company, L=City, S=State, C=US"
        echo "storeFile=../app/upload-keystore.jks" > android/key.properties
        echo "keyAlias=upload" >> android/key.properties
        echo "storePassword=android123" >> android/key.properties
        echo "keyPassword=android123" >> android/key.properties
    
    - name: Build App Bundle
      run: flutter build appbundle --release --no-tree-shake-icons
    
    - name: Upload App Bundle
      uses: actions/upload-artifact@v4
      with:
        name: app-bundle
        path: build/app/outputs/bundle/release/app-release.aab